name: Visuome CI/CD Build Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Build
      run: npm run build

    - name: Test Classifier Mappings
      run: npm run test:classifier

    - name: Test Report Schema
      run: npm run test:report

    - name: Archive Production Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: visuome-extension-build
        path: dist/
